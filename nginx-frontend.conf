# Nginx configuration for Travel Memory Frontend
# Place this in /etc/nginx/sites-available/travelmemory-frontend

upstream frontend_servers {
    server 127.0.0.1:3001;
    # Add additional frontend servers for load balancing:
    # server <IP_ADDRESS>:3001;
    # server <IP_ADDRESS>:3001;
}

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP to HTTPS (optional, requires SSL certificate)
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://frontend_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
